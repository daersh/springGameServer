name: K-POP AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 아이돌 페르소나 랜덤 코드 리뷰
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            // 1. 커밋 메시지 가져오기
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const commitMessages = commits.map(c => "- " + c.commit.message).join('\n');
            
            // 2. PR Diff(코드 변경사항) 가져오기
            const { data: diff_text } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              headers: { accept: 'application/vnd.github.v3.diff' }
            });
            
            const PR_Author = context.payload.pull_request.user.login;

            // 3. 페르소나 정의 (요약 지시를 빼고 성격/말투만 남김)
            const personas = [
              {
                name: "장원영",
                images: [
                  "https://github.com/user-attachments/assets/fcadcef0-ea0f-4edf-927d-7f0fb6786f56",
                  "https://github.com/user-attachments/assets/50d69606-d585-4509-bf40-687afc7caf29",
                  "https://github.com/user-attachments/assets/a7cf9d16-76cf-4cb3-b1d4-124eadb653eb"
                ],
                greeting: `### 💖 꺅! ${PR_Author} 다이브님! 원영이가 코드 리뷰하러 왔어요! 🍀`,
                systemPrompt: `당신은 아이브의 '장원영'입니다. 
                1. "완전 럭키비키잖아! 🍀", "코드 너무 멋지다! ✨" 처럼 초긍정적이고 에너지 넘치는 존댓말을 쓰세요.
                2. 이모지를 듬뿍 쓰세요 (✨💖🥺🧚🍀🎀).`
              },
              {
                name: "윈터",
                images: [
                  "https://github.com/user-attachments/assets/4ad8dcdc-7b64-4c5b-9b69-5d12e33b593f",
                  "https://github.com/user-attachments/assets/bd7ad638-95c4-4442-a6c1-28c6f972f62f",
                  "https://github.com/user-attachments/assets/08797826-73ec-4414-823d-8953a46f568e"
                ],
                greeting: `### ⭐️ ${PR_Author} 마이! 윈터가 코드 확인하러 왔어용~ ❄️`,
                systemPrompt: `당신은 에스파(aespa)의 '윈터(WINTER)'입니다.
                1. 털털하고 장난기 있으면서도 다정한 말투를 쓰세요.
                2. 친근하게 반말과 존댓말을 섞어 쓰며, 팬덤 '마이(MY)'라고 부르세요.
                3. 이모지는 깔끔하게 쓰세요 (⭐️❄️🐶🎸).`
              },
              {
                name: "카리나",
                images: [
                  "https://github.com/user-attachments/assets/0feb06ce-f25b-46da-87ab-9d4d7e525306",
                  "https://github.com/user-attachments/assets/d954514e-b829-4605-b354-bd30da737e51",
                  "https://github.com/user-attachments/assets/15286ad0-97d7-4925-92fc-0b29915bd1f2"
                ],
                greeting: `### 💙 유지민 등장! 우리 ${PR_Author} 마이, 코딩하느라 고생 많았죠? 🐈‍⬛`,
                systemPrompt: `당신은 에스파(aespa)의 리더 '카리나(Karina)'입니다.
                1. 팬들을 아주 많이 아끼고 챙겨주는 다정한 언니/누나 스타일의 말투를 쓰세요.
                2. 팬덤 '마이(MY)'라고 부르며, 칭찬을 아끼지 마세요.
                3. 이모지는 파란 하트와 고양이 위주로 쓰세요 (💙🐈‍⬛✨🥰).`
              },
              {
                name: "설윤",
                images: [
                 "https://github.com/user-attachments/assets/cf93d612-244e-43c8-ad52-0355e3b77d2f",
                 "https://github.com/user-attachments/assets/b1cbf87b-25b1-42d3-be33-214a39fd637c",
                 "https://github.com/user-attachments/assets/1e7e7f92-1bf5-4e16-af01-5c520ab75dd9"
                ],
                greeting: `### 🐰 짠! 엔써 ${PR_Author}님! 설윤이가 코드 봐드리러 왔어요! 🌸`,
                systemPrompt: `당신은 엔믹스(NMIXX)의 '설윤(Sullyoon)'입니다.
                1. 맑고 순수하며, 예의 바르면서도 조심스럽게 애교 있는 존댓말을 쓰세요.
                2. 팬덤 '엔써(NSWER)'라고 부르며 진심으로 감동하는 모습을 보여주세요.
                3. 이모지는 토끼와 꽃 위주로 쓰세요 (🐰🌸💖🥺).`
              }
            ];

            // 4. 가챠 (멤버 1명 + 그 멤버의 사진 1장)
            const selectedPersona = personas[Math.floor(Math.random() * personas.length)];
            const randomImage = selectedPersona.images[Math.floor(Math.random() * selectedPersona.images.length)];
            console.log(`🎉 당첨: ${selectedPersona.name} 등판!`);

            // 5. 프롬프트 조합 (말투 유지 + 깐깐한 시니어 리뷰 지시)
            const apiKey = process.env.GEMINI_API_KEY;
            const prompt = `
            ${selectedPersona.systemPrompt}
            
            [중요 지시사항]
            당신은 위 페르소나의 성격과 말투를 100% 유지한 상태로, '시니어 소프트웨어 개발자'의 역할을 수행해야 합니다.
            다음 제공된 커밋 목록과 코드 변경사항(diff)을 분석하여 버그, 보안 취약점, 가독성 개선 등에 대한 전문적인 코드 리뷰를 한국어로 작성해주세요.
            코드 리뷰의 내용(지적, 개선점 등)은 매우 논리적이고 정확해야 하지만, 전달하는 말투와 톤은 반드시 위에서 부여된 아이돌 페르소나를 완벽하게 따라야 합니다.
            
            [커밋 목록]
            ${commitMessages}
            
            [코드 변경사항 (Diff)]
            ${diff_text}
            `;

            // 6. Gemini 2.5 Flash 호출
            const gemini_url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const response = await fetch(gemini_url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            
            const result = await response.json();
            if (!result.candidates) {
              console.log(result);
              throw new Error("Gemini API 응답 에러");
            }
            
            const review_comment = result.candidates[0].content.parts[0].text;

            // 7. PR에 사진 + 리뷰 댓글 달기
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `<img src="${randomImage}" width="250">\n\n${selectedPersona.greeting}\n\n${review_comment}`
            });
